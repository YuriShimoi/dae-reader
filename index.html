<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dae Reader - Retro Matrix</title>

    <style>
      html {
        overflow: hidden;
      }
      body {
        margin: 0;
        display: flex;
        height: 100%;
        width: 100dvw;
        background: black;
        overflow: hidden;
        flex-direction: column;
        align-items: center;
      }

      input {
        display: none;
      }

      canvas {
        height: 60dvh;
      }
      canvas[fullscreen] {
        height: 100dvh;
      }
      pre {
        max-width: 100vw;
        height: 40vh;
        display: block;
        overflow: auto;
        background: #161616;
        color: white;
        width: 100%;
        margin: 0;
        padding: 2px 0;
      }

      #full-screen-btn {
        position: absolute;
        right: 16px;
        top: 16px;
        height: 40px;
        aspect-ratio: 1;
        margin: 0;
        padding: 0;
        border: 2px solid #333;
        border-radius: 6px;
        color: #333;
        background: black;
        font-weight: bold;
        font-size: 28px;
        outline: none;
        cursor: pointer;
        font-family: monospace;
        rotate: 90deg;
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }
      #full-screen-btn:hover {
        color: white;
        border-color: white;
      }
    </style>
  </head>
  <body>
    <input id="daeinput" type="file" accept=".dae">
    <canvas id="3d-simulation" width="1280" height="960">
    </canvas>
    <pre id="output">... dae-file.dae</pre>
    <button id="full-screen-btn">↹</button>
    
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"
      integrity="sha512-zhHQR0/H5SEBL3Wn6yYSaTTZej12z0hVZKOv3TwCUXT1z5qeqGcXJLLrbERYRScEDDpYIJhPC1fk31gqR783iQ=="
      crossorigin="anonymous" defer>
    </script>
    
    <script defer>
      const input = document.getElementById('daeinput');

      document.getElementById('full-screen-btn').onclick = () => {
        document.getElementById('3d-simulation').toggleAttribute('fullscreen');
      };
      document.onclick = (ev) => {
        if(ev.target.nodeName !== 'PRE' && ev.target.nodeName !== 'BUTTON') {
          input.click(ev);
        }
      };
      input.onchange = e => {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          
          reader.onload = (e) => {
            output.textContent = formatDae(e.target.result);
          };

          reader.readAsText(file);
        }
      };

      let daeinfo = {};
      function formatDae(filejson) {
        const cleanjson = filejson.replaceAll('  ', '').replaceAll('\n', '').replaceAll('\t', '').replaceAll('\r', '');

        const getAttr = (jheader, attr) => {
          if(!jheader) return '';
          if(jheader.includes(attr + '=')) {
            const pid = jheader.indexOf(attr + '=') + attr.length + 2;
            return jheader.substring(pid, jheader.substring(pid).indexOf('"') + pid);
          }
          return '';
        };

        const getNextTag = (tjson) => {
          const getKey = (hkey, htag=hkey) => {
            if(hkey.includes('id=')) {
              return getAttr(hkey, 'id');
            }
            if(hkey.includes('url=')) {
              return htag;
            }
            if(hkey.includes('name=')) {
              return `${htag}-${getAttr(hkey, 'name')}`;
            }
            if(hkey.includes('semantic=')) {
              return getAttr(hkey, 'semantic');
            }
            return htag;
          };

          const searchKeys = (hkey) => {
            if(hkey && typeof hkey == 'string') {
              let tkeys = hkey.substring(hkey.indexOf(' ')+1).match(/\b\w+(?=\s*=)/g);
              if(tkeys) return tkeys.reduce((acc, tk) => ({...acc, [tk]: getAttr(hkey, tk)}), {});
            }
            return hkey;
          }
          
          if(tjson[0] !== '<') return null;
          const jheader = tjson.substring(1, tjson.indexOf('>'));
          const jtag = jheader.substring(0, jheader.indexOf(' ')) || jheader;

          if(jtag === '?xml') return ['xml', tjson.substring(tjson.indexOf('>')+1), null];
          if(jheader.at(-1) === '/') return [getKey(jheader, jtag), searchKeys(jheader.substring(0, jheader.indexOf('/'))), tjson.substring(jheader.length + 2)];
          if(jheader[0] === '!') return getNextTag(tjson.substring(tjson.indexOf('-->') + 3));
          
          let jbody = tjson.substring(2+jheader.length, tjson.indexOf(`</${jtag}>`), jtag);
          let innerbody = tjson.substring(1);
          let deph = 0;
          let has_deph = false;
          while(innerbody.indexOf(`<${jtag}`) != -1 && innerbody.indexOf(`<${jtag}`) < innerbody.indexOf(`</${jtag}>`)) {
            deph++;
            has_deph = true;
            innerbody = innerbody.substring(innerbody.indexOf(`<${jtag}`)+1);
          }
          while(deph--) {
            innerbody = innerbody.substring(innerbody.indexOf(`</${jtag}>`)+1);
          }
          if(has_deph) {
            let endindex = innerbody.length - innerbody.indexOf(`</${jtag}>`);
            jbody = tjson.substring(2+jheader.length, tjson.length - endindex, jtag);
          }
          return [getKey(jheader, jtag === 'COLLADA'? jtag: jheader), jbody, tjson.substring(jbody.length + jtag.length + jheader.length + 5)];
        };

        const iterate = (tjson) => {
          let nt = getNextTag(tjson);
          if(nt) {
            if(nt[2]) {
              return {
                [nt[0]]: iterate(nt[1]),
                ...iterate(nt[2])
              };
            }
            else {
              return {
                [nt[0]]: iterate(nt[1])
              };
            }
          }
          else return tjson;
        }

        const iter = iterate(cleanjson);
        daeinfo.raw = iter;

        try {
          let sceneid = Object.keys(iter.xml.COLLADA.library_visual_scenes)[0];
          let objid = Object.keys(iter.xml.COLLADA.library_visual_scenes[sceneid])[0];
          let node = iter.xml.COLLADA.library_visual_scenes[sceneid][objid];
          let meshid = '';
          if('instance_geometry' in node) {
            meshid = node.instance_geometry.url.substring(1);
          }
          else if(Object.keys(node).filter(k => k.includes('instance_geometry'))[0]) {
            meshid = getAttr(Object.keys(node).filter(k => k.includes('instance_geometry'))[0], 'url').substring(1);
          }
          else if(Object.keys(node).filter(k => k.includes('node_'))[0]) {
            let nodept = node;
            while(nodept = nodept[Object.keys(nodept).filter(k => k.includes('node_'))[0]]) {
              if(Object.keys(nodept).filter(k => k.includes('instance_geometry'))[0]) {
                break;
              }
            }
            let igeokey = Object.keys(nodept).filter(k => k.includes('instance_geometry'))[0];
            meshid = (igeokey === 'instance_geometry'? nodept[igeokey].url: getAttr(igeokey, 'url')).substring(1);
          }
  
          daeinfo.matrix = iter.xml.COLLADA.library_visual_scenes[sceneid][objid].transform || iter.xml.COLLADA.library_visual_scenes[sceneid][objid].matrix;
  
          let obj_mesh = iter.xml.COLLADA.library_geometries[meshid].mesh;
          let obj_mesh_pos = "";
          if(obj_mesh[meshid+'-positions']) {
            obj_mesh_pos = obj_mesh[meshid+'-positions'][meshid+'-positions-array'];
          }
          else if(obj_mesh['pos_0']) {
            let obj_mesh_pos = obj_mesh['pos_0']['pos_0-array'];
          }
          else {
            let frsk = Object.keys(obj_mesh)[0];
            obj_mesh_pos = obj_mesh[frsk][Object.keys(obj_mesh[frsk])[0]];
          }
          let mmaps = obj_mesh_pos.trim().split(' ').map(Number);
          daeinfo.meshes = Array(Math.floor(mmaps.length/3)).fill().map((_, i) => [mmaps[0+3*i], mmaps[1+3*i], mmaps[2+3*i]]);
          
          daeinfo.triangles = [];
          for(let tkey of Object.keys(obj_mesh).filter(k => k.includes('triangles') || k.includes('polylist'))) {
            let obj_triangles = obj_mesh[tkey].p;

            let exp_amount = Number(getAttr(tkey, 'count') ?? 0);
            if(!exp_amount) break;

            let vpos = Number(obj_mesh[tkey]?.VERTEX?.offset ?? 0);
            let t_coords = obj_triangles.split(' ').map(Number);
            let v_per_coord = Math.round(t_coords.length / exp_amount / 3);
            let tmaps = t_coords.reduce((acc, v, i) => i%v_per_coord == vpos? [...acc, v]: acc, []);
            daeinfo.triangles = daeinfo.triangles.concat(Array(Math.floor(tmaps.length/3)).fill().map((_, i) => [tmaps[0+3*i], tmaps[1+3*i], tmaps[2+3*i]]));
          }

          drawDae();
        }
        catch(e) {
          console.error(e);
          alert('problem with triangles reading');
        }

        return JSON.stringify(iter, null, '  ');
      }
      
      function drawDae() {
        const flatmap = daeinfo.triangles.flat().map(m => daeinfo.meshes[m]).flat();
        drawTriangles('3d-simulation', flatmap);
      }
    </script>

    <script>
      class MiniGL {
        static animationFrameId;

        constructor(canvasId, triangles, options = {}) {
          const gl = document.getElementById(canvasId).getContext('webgl');
          const { bg = [0, 0, 0, 1], fg = [0, 1, 0, 1], fl = [1,1,1,1], initMat = mat4.create() } = options;
          this.fg = fg;
          this.fl = fl;

          // 1. Shaders & Program
          const vs = gl.createShader(gl.VERTEX_SHADER);
          gl.shaderSource(vs, `attribute vec4 p; uniform mat4 m, pr; void main(){ gl_Position=pr*m*p; }`);
          gl.compileShader(vs);

          const fs = gl.createShader(gl.FRAGMENT_SHADER);
          gl.shaderSource(fs, `precision mediump float; uniform vec4 c; void main(){ gl_FragColor=c; }`);
          gl.compileShader(fs);

          this.prog = gl.createProgram();
          gl.attachShader(this.prog, vs); gl.attachShader(this.prog, fs);
          gl.linkProgram(this.prog);
          gl.useProgram(this.prog);

          // 2. Geometry (Multiple Triangles)
          const pts = new Float32Array(triangles);
          for (let i = 0; i < pts.length; i += 3) {
            let v = vec3.fromValues(pts[i], pts[i + 1], pts[i + 2]);
            vec3.transformMat4(v, v, initMat);
            pts[i] = v[0];
            pts[i+1] = v[1];
            pts[i+2] = v[2];
          }

          const buf = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, buf);
          gl.bufferData(gl.ARRAY_BUFFER, pts, gl.STATIC_DRAW);

          const pLoc = gl.getAttribLocation(this.prog, 'p');
          gl.enableVertexAttribArray(pLoc);
          gl.vertexAttribPointer(pLoc, 3, gl.FLOAT, false, 0, 0);

          // 3. Uniforms & State
          this.gl = gl;
          this.gl.enable(this.gl.DEPTH_TEST);

          this.mLoc = gl.getUniformLocation(this.prog, 'm');
          this.prLoc = gl.getUniformLocation(this.prog, 'pr');
          
          this.rot = 0;
          this.bg = bg;
          this.m = mat4.create();
          this.pr = mat4.perspective(mat4.create(), 0.8, 1, 0.1, 20);
        }

        start() {
          const draw = () => {
            this.gl.clearColor(...this.bg);
            this.gl.clear(this.gl.COLOR_BUFFER_BIT | this.gl.DEPTH_BUFFER_BIT);
            
            this.rot += 0.02;
            mat4.identity(this.m);
            mat4.translate(this.m, this.m, [0, 0, -7]);
            mat4.rotateY(this.m, this.m, this.rot);
            mat4.rotateZ(this.m, this.m, 0.2);
            mat4.rotateX(this.m, this.m, -Math.PI/2);

            this.gl.uniformMatrix4fv(this.prLoc, false, this.pr);
            this.gl.uniformMatrix4fv(this.mLoc, false, this.m);

            const totalVertices = this.gl.getBufferParameter(this.gl.ARRAY_BUFFER, this.gl.BUFFER_SIZE) / 12; // 12 bytes per vec3
            const cLoc = this.gl.getUniformLocation(this.prog, 'c');

            this.gl.uniform4fv(this.gl.getUniformLocation(this.prog, 'c'), this.fg);
            this.gl.drawArrays(this.gl.TRIANGLES, 0, 9999);

            this.gl.uniform4fv(cLoc, this.fl);
            for (let i = 0; i < totalVertices; i += 3) {
              this.gl.drawArrays(this.gl.LINE_LOOP, i, 3);
            }

            MiniGL.animationFrameId = requestAnimationFrame(draw);
          };
          draw();
        }

        static stop() {
          cancelAnimationFrame(MiniGL.animationFrameId);
        }
      }

      function drawTriangles(canvas_id, triangles) {
        const myInitMat = mat4.create(); // Define an initial transformation
        const transformation = [1.0, 1.0, 1.0];
        mat4.scale(myInitMat, myInitMat, transformation);
        
        MiniGL.stop();
        
        const demo = new MiniGL(canvas_id, triangles, {
          bg: [0.0, 0.0, 0.0, 1.0], // Background color
          fg: [0.0, 0.0, 0.0, 1.0], // Infill color
          fl: [0.0, 1.0, 0.0, 1.0], // Line color
          initMat: myInitMat        // Initial scale
        });
    
        demo.start();
      }
    </script>
  </body>
</html>
